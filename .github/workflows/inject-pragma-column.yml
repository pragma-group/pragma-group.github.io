name: Inject PRAGMA Column

on:
  # Run whenever the PRAGMA outputs CSV is updated on main.
  # (Mirror-triggered injection is handled directly inside update-mirror.yml.)
  push:
    branches: [main]
    paths:
      - 'pragma/pragma-outputs.csv'

  # Allow manual trigger for testing or one-off full re-injection.
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Inject PRAGMA column into mailing tables
        run: |
          python .github/workflows/assets/inject-pragma-column.py \
            --papers-dir jtc1/sc22/wg21/docs/papers \
            --csv pragma/pragma-outputs.csv \
            --verbose

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jtc1/sc22/wg21/docs/papers/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update PRAGMA column in mailing tables"
            git push
          fi
